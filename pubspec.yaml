name: lamma_new
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  flutter_bloc: ^9.1.1
  rxdart: ^0.28.0
  auto_route: ^9.2.2  
  
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.3.10
  google_sign_in: ^6.2.1

  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  flutter_screenutil: ^5.9.3
  lottie: ^3.4.0
  emoji_picker_flutter: any
  shimmer: ^3.0.0

  speech_to_text: ^7.4.0
  record: ^6.2.1
  audioplayers: ^6.8.1

  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  pdf: ^3.12.0
  printing: ^5.14.3
  flutter_pdfview: ^1.3.2

  http: ^1.3.0
  flutter_dotenv: ^5.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  package_info_plus: ^8.0.0
  path_provider: ^2.1.3
  url_launcher: ^6.3.0
  intl: ^0.20.2
  flutter_local_notifications: ^22.0.1
  dartz: ^0.10.1
  equatable: ^2.1.0
  connectivity_plus: ^7.2.0
  get_it: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1
  auto_route_generator: ^9.0.0 
  mocktail: ^1.0.0
  bloc_test: ^10.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - assets/images/
    - assets/map_styles/
    - assets/animations/
    - assets/audio/
    - assets/audio/pop.mp3

dependency_overrides:
  analyzer: ^7.3.0