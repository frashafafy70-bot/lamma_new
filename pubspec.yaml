publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # الخرائط والمواقع
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.17.1
  url_launcher: ^6.3.0
  
  # فايربيز
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
